services:
  - type: web
    name: civicmind-backend
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2', backend='onnx', model_kwargs={'file_name': 'model.onnx'})"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
